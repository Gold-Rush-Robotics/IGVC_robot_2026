lane_detection_node:
  ros__parameters:
    # Camera configuration
    num_cameras: 1
    camera_topics:
      -"front_zed_camera_x_camera_link/zed_node/rgb/color/rect/image"
      - "/left_zed_camera_x_camera_link/zed_node/rgb/color/rect/image"
      - "/right_zed_camera_x_camera_link/zed_node/rgb/color/rect/image"

    depth_topics:
      - "/front_zed_camera_x_camera_link/zed_node/depth/depth_registered"
      - "/left_zed_camera_x_camera_link/zed_node/depth/depth_registered"
      - "/right_zed_camera_x_camera_link/zed_node/depth/depth_registered"
    camera_info_topics:
      - "/front_zed_camera_x_camera_link/zed_node/rgb/color/rect/camera_info"
      - "/left_zed_camera_x_camera_link/zed_node/rgb/color/rect/camera_info"
      - "/right_zed_camera_x_camera_link/zed_node/rgb/color/rect/camera_info"
    
    # Feature flags
    use_depth: true
    
    # Output topics
    lane_center_topic: "/lane_center"
    
    # Occupancy grid parameters
    grid_resolution: 0.05    # meters per cell
    grid_width: 1000.0         # total grid width in meters
    grid_height: 1000.0        # total grid height (forward distance) in meters